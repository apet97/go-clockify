# deploy/k8s/overlays/prod — production overlay.
#
# Hardens the base for production:
#   - 4 replicas so PDB minAvailable=1 leaves plenty of headroom.
#   - Full resource requests/limits (match the base deployment).
#   - CLOCKIFY_POLICY=time_tracking_safe for the public AI-facing surface.
#   - MCP_STRICT_HOST_CHECK=1 so the server refuses requests whose
#     Host header does not match the configured allowlist.
#   - commonLabels: environment=prod so observability joins cleanly.
#
# Image pinning policy (enforced by scripts/check-overlay-structure.sh):
#   This overlay intentionally does NOT set `images:` / `newTag`.
#   Prod operators are expected to pin a specific image digest at deploy
#   time via:
#
#       kustomize edit set image \
#           ghcr.io/apet97/go-clockify=ghcr.io/apet97/go-clockify@sha256:<digest>
#
#   or equivalent in their GitOps tooling. Pinning here would drift out
#   of sync with every release — and did exactly that prior to wave-a A5,
#   when the overlay was stuck at "0.7.0" while the base pointed at "v1.0.0".
#   See docs/runbooks/w2-12-digest-pinning.md for the full workflow.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

labels:
  - pairs:
      app.kubernetes.io/environment: prod
    includeSelectors: false

patches:
  - target:
      kind: Deployment
      name: clockify-mcp
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 4
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: MCP_STRICT_HOST_CHECK
          value: "1"
  - target:
      kind: ConfigMap
      name: clockify-mcp-config
    patch: |-
      - op: replace
        path: /data/CLOCKIFY_POLICY
        value: "time_tracking_safe"
