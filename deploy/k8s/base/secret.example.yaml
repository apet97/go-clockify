# EXAMPLE ONLY — DO NOT COMMIT REAL VALUES.
#
# Create the real Secret via a tool like sealed-secrets, external-secrets,
# or sops. Alternatively, apply this template with kubectl after replacing
# the placeholder values:
#
#   kubectl create secret generic clockify-mcp-secrets \
#     --namespace clockify-mcp \
#     --from-literal=CLOCKIFY_API_KEY="$CLOCKIFY_API_KEY" \
#     --from-literal=MCP_BEARER_TOKEN="$(openssl rand -base64 24)"
#
apiVersion: v1
kind: Secret
metadata:
  name: clockify-mcp-secrets
  namespace: clockify-mcp
type: Opaque
stringData:
  CLOCKIFY_API_KEY: "REPLACE_ME"
  MCP_BEARER_TOKEN: "REPLACE_ME_AT_LEAST_16_CHARS"
  # Uncomment if using OIDC with a local JWKS file
  # MCP_OIDC_JWKS_PATH: ""
  # Uncomment if the metrics endpoint requires a bearer token
  # MCP_METRICS_BEARER_TOKEN: ""
