apiVersion: v1
kind: Service
metadata:
  name: clockify-mcp
  namespace: clockify-mcp
  labels:
    app.kubernetes.io/name: clockify-mcp
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: clockify-mcp
  # Streamable HTTP sessions are correct across pod boundaries as of
  # ADR 0017 (Accepted 2026-05-02): the in-memory session manager
  # (internal/mcp/transport_streamable_http.go) rehydrates from the
  # control-plane store on a local miss, so a request that lands on
  # a fresh pod after eviction / rolling upgrade / cross-AZ failover
  # succeeds without forcing the client to re-initialize.
  #
  # ClientIP affinity remains as defence-in-depth + a perf
  # optimisation: it keeps the common-case client pinned to one pod
  # so the cross-instance Postgres Session(id) lookup does not fire
  # on every request. Tradeoff: clients sharing a NAT egress all
  # hash to the same backend; the rehydration path covers the rest.
  # The 24h timeout matches the MCP_SESSION_TTL ceiling defined in
  # internal/config/spec.go ([1m,24h]); a shorter affinity window
  # would re-hash clients more often, raising rehydration churn but
  # never breaking correctness.
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 86400
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    # Uncomment the block below (and remove the http port) to expose the
    # gRPC transport. See deploy/helm/clockify-mcp/templates/service.yaml
    # for the pattern used by the Helm chart.
    # - name: grpc
    #   port: 9090
    #   targetPort: grpc
    #   protocol: TCP
    #   appProtocol: grpc
