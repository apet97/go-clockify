apiVersion: v1
kind: Service
metadata:
  name: clockify-mcp
  namespace: clockify-mcp
  labels:
    app.kubernetes.io/name: clockify-mcp
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: clockify-mcp
  # Streamable HTTP sessions are pinned to a pod's in-memory session
  # manager (internal/mcp/transport_streamable_http.go); a session
  # created on pod A is invisible to pod B until the control-plane
  # rehydration follow-up lands. ClientIP affinity keeps a given
  # client routed to the same pod across the session lifetime so
  # `initialize` and the subsequent `tools/call` requests do not
  # split-brain. Tradeoff: clients sharing a NAT egress all hash to
  # the same backend. The 24h timeout matches the MCP_SESSION_TTL
  # ceiling defined in internal/config/spec.go ([1m,24h]); a shorter
  # affinity window would re-hash clients mid-session.
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 86400
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
    # Uncomment the block below (and remove the http port) to expose the
    # gRPC transport. See deploy/helm/clockify-mcp/templates/service.yaml
    # for the pattern used by the Helm chart.
    # - name: grpc
    #   port: 9090
    #   targetPort: grpc
    #   protocol: TCP
    #   appProtocol: grpc
