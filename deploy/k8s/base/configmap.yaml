apiVersion: v1
kind: ConfigMap
metadata:
  name: clockify-mcp-config
  namespace: clockify-mcp
data:
  CLOCKIFY_POLICY: "standard"
  CLOCKIFY_DRY_RUN: "enabled"
  CLOCKIFY_DEDUPE_MODE: "warn"
  CLOCKIFY_DEDUPE_LOOKBACK: "25"
  CLOCKIFY_OVERLAP_CHECK: "true"
  CLOCKIFY_MAX_CONCURRENT: "10"
  CLOCKIFY_CONCURRENCY_ACQUIRE_TIMEOUT: "100ms"
  CLOCKIFY_RATE_LIMIT: "120"
  CLOCKIFY_TOKEN_BUDGET: "8000"
  CLOCKIFY_TOOL_TIMEOUT: "45s"
  CLOCKIFY_REPORT_MAX_ENTRIES: "10000"
  CLOCKIFY_BOOTSTRAP_MODE: "full_tier1"
  MCP_MAX_INFLIGHT_TOOL_CALLS: "64"
  MCP_MAX_MESSAGE_SIZE: "4194304"
  # Core Clockify API (uncomment and set as needed)
  # CLOCKIFY_WORKSPACE_ID: ""
  # CLOCKIFY_BASE_URL: "https://api.clockify.me/api/v1"
  # CLOCKIFY_TIMEZONE: ""
  # CLOCKIFY_INSECURE: "0"
  # CLOCKIFY_DELTA_FORMAT: "merge"
  # MCP_GRPC_REAUTH_INTERVAL: ""
  # MCP_GRPC_TLS_CERT: ""
  # MCP_GRPC_TLS_KEY: ""
  # MCP_HTTP_TLS_CERT: ""           # streamable_http TLS cert PEM (required for streamable_http + mtls)
  # MCP_HTTP_TLS_KEY: ""            # streamable_http TLS key PEM (required for streamable_http + mtls)
  # MCP_MTLS_CA_CERT_PATH: ""       # client CA bundle for mtls verification (required for grpc + mtls AND streamable_http + mtls)
  # Auth (uncomment for non-default mode)
  # MCP_AUTH_MODE: ""
  # MCP_OIDC_ISSUER: ""
  # MCP_OIDC_AUDIENCE: ""
  # MCP_OIDC_JWKS_URL: ""
  # MCP_RESOURCE_URI: ""
  # MCP_FORWARD_TENANT_HEADER: ""
  # MCP_FORWARD_SUBJECT_HEADER: ""
  # MCP_MTLS_TENANT_HEADER: ""
  # Control plane (streamable_http)
  # MCP_CONTROL_PLANE_DSN: "memory"
  # MCP_SESSION_TTL: "30m"
  # MCP_TENANT_CLAIM: "tenant_id"
  # MCP_SUBJECT_CLAIM: "sub"
  # MCP_DEFAULT_TENANT_ID: "default"
  # CORS
  # MCP_ALLOWED_ORIGINS: ""
  # MCP_ALLOW_ANY_ORIGIN: "0"
  # MCP_STRICT_HOST_CHECK: "0"
  # Metrics endpoint
  # MCP_METRICS_BIND: ""
  # MCP_METRICS_AUTH_MODE: "none"
