# values.yaml — clockify-mcp Helm chart defaults.
#
# Every knob the base Kustomize manifests expose is reachable from
# here. Override per-environment via `-f values-{env}.yaml` or via
# `--set` on the CLI.

image:
  repository: ghcr.io/apet97/go-clockify
  # Leave blank to track `.Chart.AppVersion` automatically.
  # Pin to a specific tag if you need to override (e.g. fips image).
  tag: ""
  pullPolicy: IfNotPresent

# Number of replicas. The PDB (pdb.enabled below) pins minAvailable: 1
# so rolling updates stay available at replicaCount >= 2.
replicaCount: 2

# Override fullnameOverride to pin the resource prefix. Default is
# the release name truncated to 63 chars.
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automountServiceAccountToken: false
  # Name of the service account. If empty, the chart generates one.
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

# Hardened pod security context. Matches the base kustomize manifests.
# Do not weaken unless you know why.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

resources:
  requests:
    cpu: "100m"
    memory: "64Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

# Environment variables consumed by the server. Values here become the
# ConfigMap keys. Override per env via -f values-dev.yaml etc.
config:
  CLOCKIFY_POLICY: "standard"
  CLOCKIFY_DRY_RUN: "enabled"
  CLOCKIFY_DEDUPE_MODE: "warn"
  CLOCKIFY_DEDUPE_LOOKBACK: "25"
  CLOCKIFY_OVERLAP_CHECK: "true"
  CLOCKIFY_MAX_CONCURRENT: "10"
  CLOCKIFY_CONCURRENCY_ACQUIRE_TIMEOUT: "100ms"
  CLOCKIFY_RATE_LIMIT: "120"
  CLOCKIFY_TOKEN_BUDGET: "8000"
  CLOCKIFY_TOOL_TIMEOUT: "45s"
  CLOCKIFY_REPORT_MAX_ENTRIES: "10000"
  CLOCKIFY_BOOTSTRAP_MODE: "full_tier1"
  MCP_MAX_INFLIGHT_TOOL_CALLS: "64"
  MCP_MAX_MESSAGE_SIZE: "4194304"

# Transport-specific env. Set strictHostCheck to "1" in prod.
#
# `mode` accepts:
#   - "http"            — legacy POST-only JSON-RPC transport on :bind
#   - "streamable_http" — 2025-03-26 Streamable HTTP with SSE on :bind
#   - "grpc"            — bidirectional stream transport on :grpcBind
#                         (requires the grpc build tag; see ADR 012)
#
# When mode=grpc, the HTTP health endpoints are NOT served, so the
# readiness/liveness probes switch to a TCP socket probe on the gRPC
# port. If you're running the default stdlib build (no -tags=grpc),
# leaving mode=grpc will crash the container at startup — cmd/clockify-mcp
# aborts via grpc_off.go.
transport:
  mode: "http"
  bind: ":8080"
  grpcBind: ":9090"
  grpcReauthInterval: ""  # MCP_GRPC_REAUTH_INTERVAL (Go duration, e.g. "60s")
  grpcTlsCert: ""         # MCP_GRPC_TLS_CERT (path to server cert)
  grpcTlsKey: ""          # MCP_GRPC_TLS_KEY (path to server private key)
  httpTlsCert: ""         # MCP_HTTP_TLS_CERT (streamable_http server cert PEM; required for streamable_http + mtls; enables HTTPS when set)
  httpTlsKey: ""          # MCP_HTTP_TLS_KEY (streamable_http server key PEM; required for streamable_http + mtls)
  mtlsCaCertPath: ""      # MCP_MTLS_CA_CERT_PATH (path to CA cert for client verification; required for grpc + mtls AND streamable_http + mtls)
  strictHostCheck: "0"
  logFormat: "json"
  logLevel: "info"

# Core Clockify API knobs. Empty = server defaults.
clockify:
  workspaceId: ""     # CLOCKIFY_WORKSPACE_ID (auto-resolved if only one)
  baseUrl: ""         # CLOCKIFY_BASE_URL (default: https://api.clockify.me/api/v1)
  timezone: ""        # CLOCKIFY_TIMEZONE (default: system)
  insecure: ""        # CLOCKIFY_INSECURE ("1" to allow non-loopback HTTP)
  deltaFormat: ""     # CLOCKIFY_DELTA_FORMAT ("merge" or "jsonpatch", default: merge)

# Authentication. Modes: static_bearer, oidc, forward_auth, mtls.
# Empty = auto-detected per transport (see config.go).
auth:
  mode: ""                  # MCP_AUTH_MODE
  oidcIssuer: ""            # MCP_OIDC_ISSUER
  oidcAudience: ""          # MCP_OIDC_AUDIENCE
  oidcJwksUrl: ""           # MCP_OIDC_JWKS_URL
  oidcJwksPath: ""          # MCP_OIDC_JWKS_PATH (file mount)
  resourceUri: ""           # MCP_RESOURCE_URI (OAuth 2.1 RS indicator)
  forwardTenantHeader: ""   # MCP_FORWARD_TENANT_HEADER
  forwardSubjectHeader: ""  # MCP_FORWARD_SUBJECT_HEADER
  mtlsTenantHeader: ""      # MCP_MTLS_TENANT_HEADER

# Streamable-HTTP control plane.
controlPlane:
  dsn: ""               # MCP_CONTROL_PLANE_DSN (default: memory)
  sessionTtl: ""        # MCP_SESSION_TTL (default: 30m)
  tenantClaim: ""       # MCP_TENANT_CLAIM (default: tenant_id)
  subjectClaim: ""      # MCP_SUBJECT_CLAIM (default: sub)
  defaultTenantId: ""   # MCP_DEFAULT_TENANT_ID (default: default)

# CORS.
cors:
  allowedOrigins: ""    # MCP_ALLOWED_ORIGINS (comma-separated)
  allowAnyOrigin: ""    # MCP_ALLOW_ANY_ORIGIN ("1" to allow all)

# Metrics endpoint. Separate bind address from the main transport.
metricsEndpoint:
  bind: ""              # MCP_METRICS_BIND (empty = disabled)
  authMode: ""          # MCP_METRICS_AUTH_MODE (default: none)

# Secret values. By default the chart creates a placeholder Secret with
# empty values so operators remember to inject real ones before applying.
# Set create: false to use an external Secret (e.g. sealed-secrets).
secrets:
  create: true
  name: ""  # defaults to "{fullname}-secrets"
  clockifyApiKey: ""           # CLOCKIFY_API_KEY
  mcpBearerToken: ""           # MCP_BEARER_TOKEN
  metricsBearerToken: ""       # MCP_METRICS_BEARER_TOKEN

service:
  type: ClusterIP
  port: 8080
  # Port used when transport.mode=grpc. Ignored for http modes.
  grpcPort: 9090

# NetworkPolicy — default-deny with two allowlist labels. Set
# networkPolicy.enabled: false to opt out entirely.
networkPolicy:
  enabled: true
  ingressAllowedLabel: "clockify-mcp-ingress-allowed"
  metricsScraperLabel: "clockify-mcp-metrics-scraper"
  kubeDnsNamespace: "kube-system"
  kubeDnsLabel: "k8s-app=kube-dns"

pdb:
  enabled: true
  minAvailable: 1

# kube-prometheus-stack ServiceMonitor. Gated behind
# metrics.serviceMonitor.enabled so clusters without the operator
# CRDs installed do not fail the template render.
metrics:
  serviceMonitor:
    enabled: false
    interval: "30s"
    scrapeTimeout: "10s"
  prometheusRule:
    enabled: false
    sloBudgetFactor: "0.001"  # 99.9% SLO

# Probe tuning. The base manifests' defaults are encoded here.
probes:
  startup:
    path: /health
    failureThreshold: 30
    periodSeconds: 1
  liveness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    path: /ready
    initialDelaySeconds: 3
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 2

# Deployment rollout strategy.
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

# Termination grace period for clean shutdowns.
terminationGracePeriodSeconds: 30

# Revision history kept on the Deployment.
revisionHistoryLimit: 3
