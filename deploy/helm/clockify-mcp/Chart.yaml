apiVersion: v2
name: clockify-mcp
description: |
  Stdlib-only Model Context Protocol server for Clockify.
  Exposes 124 Clockify tools over HTTP or stdio for use with Claude
  Desktop, Cursor, and other MCP clients.
type: application
# Chart version tracks the MCP server semver exactly. Bump on release
# (cmd/clockify-mcp/main.go reads its own version via ldflags + build-info,
# so only this file needs editing).
version: 1.2.0
appVersion: "1.2.0"
kubeVersion: ">=1.27.0-0"
keywords:
  - clockify
  - mcp
  - model-context-protocol
  - time-tracking
home: https://github.com/apet97/go-clockify
sources:
  - https://github.com/apet97/go-clockify
maintainers:
  - name: apet97
    url: https://github.com/apet97
