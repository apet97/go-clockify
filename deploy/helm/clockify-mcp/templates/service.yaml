apiVersion: v1
kind: Service
metadata:
  name: {{ include "clockify-mcp.fullname" . }}
  labels:
    {{- include "clockify-mcp.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "clockify-mcp.selectorLabels" . | nindent 4 }}
  {{- if ne .Values.transport.mode "grpc" }}
  # Streamable HTTP sessions are pinned to a pod's in-memory session
  # manager; without ClientIP affinity, an `initialize` on pod A
  # followed by `tools/call` on pod B returns "session not found".
  # gRPC mode (long-lived bidi streams) does not need or use this.
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  {{- end }}
  ports:
    {{- if eq .Values.transport.mode "grpc" }}
    - name: grpc
      port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
      appProtocol: grpc
    {{- else }}
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
    {{- end }}
    {{- with .Values.metricsEndpoint.bind }}
    - name: metrics
      port: {{ $.Values.metricsEndpoint.servicePort }}
      targetPort: metrics
      protocol: TCP
    {{- end }}
