{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clockify-mcp.secretName" . }}
  labels:
    {{- include "clockify-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Both values must be set before the pod becomes ready. The chart
  # defaults leave them empty so a `helm install` with no `--set`
  # surfaces a clear readiness failure rather than silently running
  # with missing credentials.
  CLOCKIFY_API_KEY: {{ .Values.secrets.clockifyApiKey | quote }}
  MCP_BEARER_TOKEN: {{ .Values.secrets.mcpBearerToken | quote }}
  {{- with .Values.secrets.metricsBearerToken }}
  MCP_METRICS_BEARER_TOKEN: {{ . | quote }}
  {{- end }}
{{- end }}
