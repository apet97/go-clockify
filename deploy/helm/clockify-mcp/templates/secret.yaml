{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clockify-mcp.secretName" . }}
  labels:
    {{- include "clockify-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  # CLOCKIFY_API_KEY semantics depend on MCP_PROFILE:
  #   - single-tenant-http: required at config load time. Empty key
  #     fails fast with a clear startup error (config.go).
  #   - shared-service / prod-postgres: not required here; the
  #     control-plane store provides per-tenant credentials, so an
  #     empty value is acceptable and the chart leaves it blank.
  # MCP_BEARER_TOKEN must be set whenever auth.mode=static_bearer
  # (>=16 chars) — the server refuses to start otherwise.
  CLOCKIFY_API_KEY: {{ .Values.secrets.clockifyApiKey | quote }}
  MCP_BEARER_TOKEN: {{ .Values.secrets.mcpBearerToken | quote }}
  {{- with .Values.secrets.metricsBearerToken }}
  MCP_METRICS_BEARER_TOKEN: {{ . | quote }}
  {{- end }}
{{- end }}
