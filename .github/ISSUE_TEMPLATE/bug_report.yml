name: Bug Report
description: Report a bug in the Clockify MCP Server
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the following information.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Set CLOCKIFY_API_KEY=...
        2. Run clockify-mcp
        3. Send MCP request...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: dropdown
    id: transport
    attributes:
      label: Transport
      options:
        - stdio
        - http
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `clockify-mcp --version`
      placeholder: v0.2.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true
  - type: input
    id: client
    attributes:
      label: MCP Client
      description: e.g., Claude Desktop, Cursor, custom
      placeholder: Claude Desktop
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant stderr output
      render: text
