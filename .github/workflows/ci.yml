name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            gofmt -d .
            exit 1
          fi

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - run: go vet ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.5.0

  vulncheck:
    name: Vulncheck
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Run govulncheck
        # Install from master so the binary's bundled go/types supports the
        # module's current Go directive (go1.25). The last tagged release
        # (v1.1.4) was built with go1.24 and refuses to parse go1.25 code.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@master
          govulncheck ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - run: go build ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - run: go test -race -count=1 -timeout 120s ./...

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Run tests with coverage
        # Scope coverage to ./internal/... so we avoid instrumenting the
        # cmd/clockify-mcp main package (which has no tests and trips over
        # `go tool covdata` on some Go toolchain installs).
        run: go test -race -count=1 -timeout 120s -coverprofile=coverage.out ./internal/...
      - name: Check coverage threshold
        run: |
          set -euo pipefail
          COVERAGE=$(go tool cover -func=coverage.out | awk '/^total:/ {print $NF}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          awk -v cov="$COVERAGE" 'BEGIN { exit (cov + 0 < 50) ? 1 : 0 }' || {
            echo "Coverage ${COVERAGE}% is below 50% threshold"
            exit 1
          }

  fuzz:
    name: Fuzz (20s per target)
    runs-on: ubuntu-latest
    continue-on-error: true
    # Hard ceiling: if any target hangs, the whole job is killed after 8min
    # instead of occupying the runner for GitHub's default 6-hour timeout.
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Run fuzz targets
        # -fuzztime=20s keeps the happy path well under timeout-minutes while
        # still exercising the 3 targets meaningfully.
        run: |
          go test -fuzz=FuzzParseDatetime -fuzztime=20s ./internal/timeparse
          go test -fuzz=FuzzValidateID   -fuzztime=20s ./internal/resolve
          go test -fuzz=FuzzJSONRPCParse -fuzztime=20s ./internal/mcp

  test-http:
    name: Test (HTTP smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Build and smoke-test HTTP transport
        run: |
          go build -o clockify-mcp ./cmd/clockify-mcp
          MCP_TRANSPORT=http \
          MCP_HTTP_BIND=127.0.0.1:8091 \
          MCP_BEARER_TOKEN=smoke-test-token-1234567890 \
          CLOCKIFY_API_KEY=smoke-test-dummy \
          ./clockify-mcp &
          PID=$!
          sleep 2
          # /health just reports server liveness — expect 200.
          curl -sf http://127.0.0.1:8091/health || { kill "$PID" 2>/dev/null; exit 1; }
          # /ready calls the Clockify API with the dummy key and will return
          # 503; the smoke test only verifies the endpoint is reachable.
          code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8091/ready)
          case "$code" in
            200|503) ;;
            *) echo "unexpected /ready status: $code"; kill "$PID" 2>/dev/null; exit 1 ;;
          esac
          kill "$PID" 2>/dev/null || true
