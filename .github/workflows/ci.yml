name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            gofmt -d .
            exit 1
          fi

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - run: go vet ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.5.0

  vulncheck:
    name: Vulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Run govulncheck
        # Install from master so the binary's bundled go/types supports the
        # module's current Go directive (go1.25). The last tagged release
        # (v1.1.4) was built with go1.24 and refuses to parse go1.25 code.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@master
          govulncheck ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Verify build-tag wiring (default + otel/grpc/pprof/fips)
        # Extracted to scripts/check-build-tags.sh so `make verify-core` and CI
        # exercise the same symbol and go.mod parity checks.
        run: bash scripts/check-build-tags.sh

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - run: go test -race -count=1 -timeout 120s ./...

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Run tests and enforce coverage floors
        # Global + per-package floors are defined in scripts/check-coverage.sh
        # (COVERAGE_GLOBAL_FLOOR, COVERAGE_FLOORS). `make cover-check` calls
        # the same script so local runs match CI.
        run: bash scripts/check-coverage.sh

  fuzz:
    name: Fuzz (30s per target)
    runs-on: ubuntu-latest
    # Hard ceiling: if any target hangs, the whole job is killed after 8min
    # instead of occupying the runner for GitHub's default 6-hour timeout.
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Run fuzz targets
        # -fuzztime=30s gives the worker pool enough headroom for the growing
        # FuzzJSONRPCParse corpus, which under Wave 3 started producing
        # "context deadline exceeded" flakes at the former 20s budget even
        # without a crashing input (the fuzzer was still discovering new
        # coverage paths at the 20s mark). 3 targets * 30s ~= 90s worst
        # case; still well under the 8min job ceiling.
        run: |
          go test -fuzz=FuzzParseDatetime -fuzztime=30s ./internal/timeparse
          go test -fuzz=FuzzValidateID   -fuzztime=30s ./internal/resolve
          go test -fuzz=FuzzJSONRPCParse -fuzztime=30s ./internal/mcp

  deploy-render:
    name: Deploy render (k8s + helm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Install kubeconform
        run: go install github.com/yannh/kubeconform/cmd/kubeconform@v0.7.0
      - name: Render and validate Kustomize + Helm
        # Extracted to scripts/check-k8s-render.sh so `make verify-k8s`
        # exercises the same base/overlay/helm render path.
        run: bash scripts/check-k8s-render.sh

  test-http:
    name: Test (HTTP smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Build and smoke-test HTTP transport
        # Extracted to scripts/smoke-http.sh so `make verify-core` runs the
        # same /health + /ready probe.
        run: bash scripts/smoke-http.sh
