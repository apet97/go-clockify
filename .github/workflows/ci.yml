name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "Unformatted files:"
            echo "$unformatted"
            gofmt -d .
            exit 1
          fi

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - run: go vet ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.5.0

  vulncheck:
    name: Vulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Run govulncheck
        # Pin to a specific golang.org/x/vuln commit so supply-chain
        # auditors can point at what actually ran. The last tagged
        # release (v1.1.4) was built with go1.24 and refuses to
        # parse go1.25 code; pinning @master is too volatile for a
        # production CI gate. Revisit once a tagged release supports
        # go1.25 — tracked as a Wave L follow-up issue.
        #
        # SHA resolved 2026-04-22 against
        # https://github.com/golang/vuln/commits/master.
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@5499630db5f896778f084a8b3720910426de5c53
          govulncheck ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Verify build-tag wiring (default + otel/grpc/pprof/fips)
        # Extracted to scripts/check-build-tags.sh so `make verify-core` and CI
        # exercise the same symbol and go.mod parity checks.
        run: bash scripts/check-build-tags.sh

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - run: go test -race -count=1 -timeout 120s ./...

  test-grpc:
    name: Test (gRPC tag)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Run cross-transport tests under -tags=grpc
        # Mirrors the "full E2E" line in `make release-check`:
        #   go test -tags=grpc -race -count=1 -timeout 180s ./tests/...
        # The default `test` job above runs without build tags, which
        # skips //go:build grpc files in tests/ (parity_grpc_test.go,
        # e2e_grpc_test.go, harness/grpc_smoke_test.go) and the gRPC
        # rows of the cross-transport parity matrix (cancellation,
        # list_changed, size_limit, panic_recovery). The build job
        # is compile-only via scripts/check-build-tags.sh, and
        # grpc-auth-smoke below is unit-scoped to internal/transport/grpc.
        # Without this job, a regression in tests/harness/grpc.go,
        # the async gRPC DispatchMessage panic recovery, or any gRPC
        # parity assertion would land on main if the contributor
        # skipped `make release-check` locally.
        # Static command, no untrusted input — hook advisory does not apply.
        run: go test -tags=grpc -race -count=1 -timeout 180s ./tests/...

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Run tests and enforce coverage floors
        # Global + per-package floors are defined in scripts/check-coverage.sh
        # (COVERAGE_GLOBAL_FLOOR, COVERAGE_FLOORS). `make cover-check` calls
        # the same script so local runs match CI.
        run: bash scripts/check-coverage.sh

  fuzz:
    name: Fuzz
    runs-on: ubuntu-latest
    # Hard ceiling: if any target hangs, the whole job is killed after 8min
    # instead of occupying the runner for GitHub's default 6-hour timeout.
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Run fuzz targets
        # Count-based budget (-fuzztime=Nx) instead of duration-based
        # (-fuzztime=Ns) to eliminate the "context deadline exceeded"
        # flake class at its root. The old 30s budget was a patch over
        # a 20s budget that itself was a patch over a 10s budget --
        # each bump delayed the symptom without fixing the cause,
        # which is that Go's fuzz engine cancels its internal context
        # at exactly -fuzztime, and any worker still mid-execution
        # surfaces the cancellation as a test failure even when no
        # input actually crashed. Wave D's 800-entry committed corpus
        # made this worse because baseline gathering now takes a
        # meaningful slice of the duration budget before mutation
        # starts. Count-based budgets have no timing race: the engine
        # stops after N executions regardless of wall clock.
        #
        # 300_000 execs per target * ~250k execs/sec on GitHub Actions
        # runners -> ~1.2s per target, total ~4s for the job plus
        # build + baseline gathering. Well under the 8min job ceiling.
        run: |
          go test -fuzz=FuzzParseDatetime -fuzztime=300000x -run='^$' -timeout=5m ./internal/timeparse
          go test -fuzz=FuzzValidateID   -fuzztime=300000x -run='^$' -timeout=5m ./internal/resolve
          go test -fuzz=FuzzJSONRPCParse -fuzztime=300000x -run='^$' -timeout=5m ./internal/mcp

  config-doc-parity:
    name: Config doc parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Verify help+README generated from internal/config/spec.go
        # Re-renders cmd/clockify-mcp/help_generated.go and the
        # CONFIG-TABLE block in README.md, then fails if either has
        # drifted from internal/config/AllSpecs(). Keeps EnvSpec as the
        # single source of truth; editing spec.go without regenerating
        # cannot merge. Input is the static script path, not event data.
        run: bash scripts/check-config-doc-parity.sh
      - name: Verify governance matches branch-protection snapshot
        # Fails when GOVERNANCE.md claims current controls that
        # docs/branch-protection.md says are not actually enforced.
        # Input is the static script path, not event data.
        run: sh scripts/check-governance-parity.sh
      - name: Verify public launch checklist CLI parity
        # Fails when the hosted launch checklist references CLI flags
        # that cmd/clockify-mcp does not implement.
        run: bash scripts/check-launch-checklist-parity.sh

  repo-hygiene:
    name: Repo hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Check for tracked OS / editor / coverage junk
        # Fails if any .DS_Store, swap file, coverage.out, or *.prof
        # slips into HEAD. Keeps the repo tree clean by automation
        # rather than discipline alone. Input is the static script
        # path, not event data.
        run: bash scripts/check-repo-hygiene.sh
      - name: Verify bench-output filter contract
        # Runs the same regression test invoked locally by `make script-tests`,
        # `make verify-core`, and `make release-check`. Guards
        # scripts/filter-bench-output.sh because bench.yml pipes raw
        # `go test -bench` output through it.
        run: bash scripts/test-filter-bench-output.sh
      - name: Verify bench-baseline gate contract
        # Same playbook as the filter test above. Guards
        # scripts/check-bench-baseline.sh, which validates that
        # internal/benchdata/baseline.txt covers every package the
        # bench.yml workflow runs, has linux/amd64 rows only, and
        # has at least the workflow's -count= samples per benchmark.
        # A regression in the gate would silently let a stale or
        # mismatched baseline through verify-bench. Static input,
        # no event data.
        run: bash scripts/test-check-bench-baseline.sh
      - name: Verify coverage gate contract
        # Same playbook as the two filter/baseline tests above.
        # Guards scripts/check-coverage.sh, which enforces both the
        # global and per-package coverage floors used by the
        # `coverage` job and `make cover-check`. The gate is
        # pure-shell and pure-awk; a typo in any of its parsing
        # paths would silently turn the floor check into a no-op.
        # The test stubs `go` via PATH and exercises every exit
        # branch without running the real test suite.
        run: bash scripts/test-check-coverage.sh

  deploy-render:
    name: Deploy render (k8s + helm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Install kubeconform
        run: go install github.com/yannh/kubeconform/cmd/kubeconform@v0.7.0
      - name: Render and validate Kustomize + Helm
        # Extracted to scripts/check-k8s-render.sh so `make verify-k8s`
        # exercises the same base/overlay/helm render path.
        run: bash scripts/check-k8s-render.sh

  test-http:
    name: Test (HTTP smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Build and smoke-test HTTP transport
        # Extracted to scripts/smoke-http.sh so `make verify-core` runs the
        # same /health + /ready probe.
        run: bash scripts/smoke-http.sh
      - name: Smoke-test stdio transport
        # Paired with smoke-http.sh above. Stdio is the MCP spec default
        # transport (internal/mcp/server.go Run() -- newline-delimited
        # JSON-RPC) and had no CI exercise prior to Wave D. A regression
        # in the scanner loop or response encoder would otherwise only
        # surface via user reports. Script takes no external input.
        run: bash scripts/smoke-stdio.sh

  grpc-auth-smoke:
    name: gRPC auth smoke
    runs-on: ubuntu-latest
    # Behavioural gate for the gRPC auth interceptor — pins that mTLS
    # streams do not require an Authorization metadata pair, that the
    # generic "authentication failed" response does not leak the
    # underlying failure reason, and that non-mTLS modes still demand
    # Authorization metadata. The build-tag matrix is compile-only;
    # the remaining risk after that is behavioural, so this is its
    # own job rather than hiding inside `test`.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Run gRPC auth/mTLS regression suite
        run: bash scripts/smoke-grpc-auth.sh

  doctor-strict:
    name: Doctor strict smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Run strict doctor smoke
        # Offline synthetic env only: verifies strict-mode flag
        # parsing and posture findings without requiring Postgres.
        run: bash scripts/smoke-doctor-strict.sh

  doctor-postgres:
    name: Doctor Postgres backend
    runs-on: ubuntu-latest
    # Hard ceiling: the build + Postgres health check is ~30s on a
    # warm runner; 10min leaves headroom for cold pgx download and
    # service-container start without letting a hung backend monopolise
    # the runner.
    timeout-minutes: 10
    services:
      # Ephemeral Postgres for the backend doctor check. The service is
      # created with the credentials the DSN below references and is
      # torn down with the runner at job exit. No external secrets are
      # required: DoctorCheck(ctx) writes/reads a single audit_events
      # row in this throwaway database and deletes it before returning.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: clockify
          POSTGRES_PASSWORD: clockify
          POSTGRES_DB: clockify_mcp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clockify -d clockify_mcp"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Run Postgres backend doctor smoke
        # Builds with -tags=postgres so the pgx-backed control-plane
        # store is linked in, then runs `doctor --strict
        # --check-backends` against the local service. Exit 0 proves
        # migrations applied, audit_events.phase exists, and the
        # DoctorCheck(ctx) audit round-trip succeeded — i.e. the
        # production hosted backend gate is operational, not just a
        # config-string check.
        env:
          MCP_CONTROL_PLANE_DSN: postgres://clockify:clockify@localhost:5432/clockify_mcp?sslmode=disable
        run: bash scripts/smoke-doctor-postgres.sh

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    # Hard ceiling: the scan is ~2s on current repo size; 5min leaves
    # headroom for repo growth or an unusually slow runner without
    # letting a hung gitleaks monopolise the job.
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install pinned gitleaks
        # scripts/gitleaks-install.sh downloads gitleaks directly from
        # the upstream GitHub release with a SHA256-pinned tarball.
        # Deliberately does NOT use a third-party action -- every
        # `uses:` line is an extra supply-chain link, and gitleaks'
        # rules come from the same repo as the binary, so pulling the
        # binary directly via curl + sha256sum is strictly fewer moving
        # parts than going through a gitleaks-action wrapper.
        run: bash scripts/gitleaks-install.sh "$HOME/gitleaks-bin"
      - name: Run gitleaks
        # --no-git so the scan walks the working tree (same shape as
        # what gets uploaded to a PR) rather than crawling git history
        # on every push. History scans are expensive and duplicate what
        # prior pushes already checked; new content is what matters.
        # --redact so the CI log never prints a secret even if one is
        # found. --config .gitleaks.toml pulls allowlists from the repo.
        run: |
          "$HOME/gitleaks-bin/gitleaks" detect \
            --no-git \
            --source . \
            --redact \
            --config .gitleaks.toml \
            --exit-code 1
