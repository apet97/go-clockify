name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      attestations: write
      packages: write
      actions: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: "v2.4.3"
      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify release asset count
        # Structural gate against the v0.7.0 class of bug (goreleaser
        # filter silently drops a whole artifact category). Fails the
        # workflow before staging/attestation/npm if dist/ doesn't
        # contain exactly the 46 files .goreleaser.yaml is contracted
        # to produce (15 binaries + 15 SBOMs + 15 sigstore bundles +
        # SHA256SUMS.txt). No untrusted input; calls an in-repo script
        # with no arguments (it defaults to ./dist).
        # See docs/runbooks/release-asset-count.md for triage.
        run: bash scripts/check-release-assets.sh
      - name: Stage release binaries for attestation
        run: |
          set -euo pipefail
          mkdir -p staging
          cp dist/clockify-mcp_darwin_arm64_v8.0/clockify-mcp staging/clockify-mcp-darwin-arm64
          cp dist/clockify-mcp_darwin_amd64_v1/clockify-mcp    staging/clockify-mcp-darwin-x64
          cp dist/clockify-mcp_linux_amd64_v1/clockify-mcp     staging/clockify-mcp-linux-x64
          cp dist/clockify-mcp_linux_arm64_v8.0/clockify-mcp   staging/clockify-mcp-linux-arm64
          cp dist/clockify-mcp_windows_amd64_v1/clockify-mcp.exe staging/clockify-mcp-windows-x64.exe
          # Postgres-tagged hosted-deploy binaries. Linux-only matrix —
          # see the clockify-mcp-postgres build block in .goreleaser.yaml.
          cp dist/clockify-mcp-postgres_linux_amd64_v1/clockify-mcp-postgres staging/clockify-mcp-postgres-linux-x64
          cp dist/clockify-mcp-postgres_linux_arm64_v8.0/clockify-mcp-postgres staging/clockify-mcp-postgres-linux-arm64
          # gRPC-tagged private-network artifacts (linux-only). The hosted
          # launch checklist links to clockify-mcp-grpc-postgres-* for HA
          # private-network gRPC; the no-postgres -grpc binary covers
          # single-process private-network gRPC. Both ship through the
          # cosign + SLSA chain so operators are not forced to self-build.
          cp dist/clockify-mcp-grpc_linux_amd64_v1/clockify-mcp-grpc   staging/clockify-mcp-grpc-linux-x64
          cp dist/clockify-mcp-grpc_linux_arm64_v8.0/clockify-mcp-grpc staging/clockify-mcp-grpc-linux-arm64
          cp dist/clockify-mcp-grpc-postgres_linux_amd64_v1/clockify-mcp-grpc-postgres   staging/clockify-mcp-grpc-postgres-linux-x64
          cp dist/clockify-mcp-grpc-postgres_linux_arm64_v8.0/clockify-mcp-grpc-postgres staging/clockify-mcp-grpc-postgres-linux-arm64
          # FIPS-tagged binaries. v1.1.0 verification surfaced a real
          # gap: the FIPS row had been added to GoReleaser without
          # extending this staging step, so every published FIPS
          # binary back to v1.0.x ships cosign-signed but with NO SLSA
          # build provenance (gh attestation verify returns HTTP 404).
          # Operators running the FIPS binary cannot prove it was
          # built by this workflow. Stage them here so the next
          # release closes the gap.
          cp dist/clockify-mcp-fips_darwin_arm64_v8.0/clockify-mcp-fips staging/clockify-mcp-fips-darwin-arm64
          cp dist/clockify-mcp-fips_darwin_amd64_v1/clockify-mcp-fips   staging/clockify-mcp-fips-darwin-x64
          cp dist/clockify-mcp-fips_linux_amd64_v1/clockify-mcp-fips    staging/clockify-mcp-fips-linux-x64
          cp dist/clockify-mcp-fips_linux_arm64_v8.0/clockify-mcp-fips  staging/clockify-mcp-fips-linux-arm64
      - name: Generate SLSA build provenance attestation
        # Repo is public (2026-04-22) — attestation is now a
        # mandatory gate on release. A failure here must fail the
        # release rather than silently drop the SLSA row from the
        # supply-chain chain.
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            staging/clockify-mcp-darwin-arm64
            staging/clockify-mcp-darwin-x64
            staging/clockify-mcp-linux-x64
            staging/clockify-mcp-linux-arm64
            staging/clockify-mcp-windows-x64.exe
            staging/clockify-mcp-postgres-linux-x64
            staging/clockify-mcp-postgres-linux-arm64
            staging/clockify-mcp-grpc-linux-x64
            staging/clockify-mcp-grpc-linux-arm64
            staging/clockify-mcp-grpc-postgres-linux-x64
            staging/clockify-mcp-grpc-postgres-linux-arm64
            staging/clockify-mcp-fips-darwin-arm64
            staging/clockify-mcp-fips-darwin-x64
            staging/clockify-mcp-fips-linux-x64
            staging/clockify-mcp-fips-linux-arm64
      - name: Publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret is not set — skipping npm publish."
            echo "To enable npm distribution: set NPM_TOKEN in repo secrets"
            echo "with an automation token scoped to @apet97 (see W2-13 notes)."
            exit 0
          fi
          ./scripts/publish-npm.sh "$RELEASE_VERSION"
      - name: Trigger reproducibility verification
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # GoReleaser creates the GH release via GITHUB_TOKEN, which
          # suppresses the `release: [published]` event per GitHub's
          # infinite-loop-prevention rules. Fire the reproducibility
          # workflow explicitly via workflow_dispatch (which IS allowed
          # with GITHUB_TOKEN) to close the gap.
          echo "Dispatching reproducibility.yml for tag ${RELEASE_VERSION}"
          gh workflow run reproducibility.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref "${RELEASE_VERSION}" \
            -f tag="${RELEASE_VERSION}"
          echo "Dispatched. Monitor: gh run list --workflow=reproducibility.yml"
