name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  id-token: write

jobs:
  build-binaries:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            os: macos-14
            goos: darwin
            goarch: arm64
            platform: darwin-arm64
          - target: darwin-amd64
            os: macos-14
            goos: darwin
            goarch: amd64
            platform: darwin-x64
          - target: linux-amd64
            os: ubuntu-22.04
            goos: linux
            goarch: amd64
            platform: linux-x64
          - target: linux-arm64
            os: ubuntu-22.04
            goos: linux
            goarch: arm64
            platform: linux-arm64
          - target: windows-amd64
            os: ubuntu-22.04
            goos: windows
            goarch: amd64
            platform: windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Build binary
        run: |
          VERSION="${GITHUB_REF_NAME}"
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          CGO_ENABLED=0 GOOS=$GOOS GOARCH=$GOARCH go build \
            -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o "clockify-mcp-${PLATFORM}${EXT}" \
            ./cmd/clockify-mcp
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          PLATFORM: ${{ matrix.platform }}
      - name: Smoke-test (native builds only)
        if: ${{ matrix.goos == 'darwin' || (matrix.goos == 'linux' && matrix.goarch == 'amd64') }}
        run: |
          BIN="clockify-mcp-${PLATFORM}"
          chmod +x "$BIN"
          MCP_TRANSPORT=http \
          MCP_HTTP_BIND=127.0.0.1:8091 \
          MCP_BEARER_TOKEN=smoke-test-token-1234567890 \
          CLOCKIFY_API_KEY=smoke-test-dummy \
          ./"$BIN" &
          PID=$!
          sleep 2
          # /health just reports server liveness — expect 200.
          curl -sf http://127.0.0.1:8091/health || { kill "$PID" 2>/dev/null; exit 1; }
          # /ready calls the Clockify API with the dummy key and will return
          # 503; the smoke test only verifies the endpoint is reachable.
          code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8091/ready)
          case "$code" in
            200|503) ;;
            *) echo "unexpected /ready status: $code"; kill "$PID" 2>/dev/null; exit 1 ;;
          esac
          kill "$PID" 2>/dev/null || true
        env:
          PLATFORM: ${{ matrix.platform }}
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          artifact-name: sbom-${{ matrix.platform }}
          output-file: clockify-mcp-${{ matrix.platform }}.spdx.json
          format: spdx-json
      - name: Upload binary artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: binary-${{ matrix.platform }}
          path: clockify-mcp-${{ matrix.platform }}*
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: sbom-${{ matrix.platform }}
          path: clockify-mcp-${{ matrix.platform }}.spdx.json

  publish-npm:
    name: Publish npm packages
    needs: build-binaries
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: artifacts/
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: "20"
          registry-url: https://registry.npmjs.org
      - name: Publish platform packages
        run: |
          PLATFORMS="darwin-arm64:darwin:arm64:macOS ARM64
          darwin-x64:darwin:x64:macOS x64
          linux-x64:linux:x64:Linux x64
          linux-arm64:linux:arm64:Linux ARM64
          windows-x64:win32:x64:Windows x64"

          echo "$PLATFORMS" | while IFS=: read -r platform os cpu desc; do
            platform=$(echo "$platform" | xargs)
            pkg_dir="npm-pkg-${platform}"
            mkdir -p "${pkg_dir}/bin"

            # Copy binary from artifact
            if [ "${platform}" = "windows-x64" ]; then
              cp "artifacts/binary-${platform}/clockify-mcp-${platform}.exe" "${pkg_dir}/bin/clockify-mcp.exe"
            else
              cp "artifacts/binary-${platform}/clockify-mcp-${platform}" "${pkg_dir}/bin/clockify-mcp"
              chmod +x "${pkg_dir}/bin/clockify-mcp"
            fi

            # Generate platform package.json from template
            VERSION="${GITHUB_REF_NAME#v}"
            sed -e "s/PLATFORM/${platform}/g" \
                -e "s/PLATFORM_DESCRIPTION/${desc}/g" \
                -e "s/OS_VALUE/${os}/g" \
                -e "s/CPU_VALUE/${cpu}/g" \
                -e "s/VERSION/${VERSION}/g" \
                npm/package.json.tmpl > "${pkg_dir}/package.json"

            cd "${pkg_dir}"
            npm publish --access public
            cd ..
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish base package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd npm/clockify-mcp-go
          VERSION="${VERSION}" node -e '
            const fs = require("fs");
            const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
            pkg.version = process.env.VERSION;
            for (const name of Object.keys(pkg.optionalDependencies || {})) {
              pkg.optionalDependencies[name] = process.env.VERSION;
            }
            fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2) + "\n");
          '
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    name: Create GitHub Release
    needs: build-binaries
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: artifacts/
      - name: Install cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3
      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for dir in artifacts/binary-*; do
            platform=$(basename "$dir" | sed 's/binary-//')
            for bin in "$dir"/clockify-mcp-*; do
              [ -f "$bin" ] || continue
              dest="release-assets/$(basename "$bin")"
              cp "$bin" "$dest"
              chmod +x "$dest" 2>/dev/null || true
            done
          done
          for dir in artifacts/sbom-*; do
            [ -d "$dir" ] || continue
            cp "$dir"/*.spdx.json release-assets/ 2>/dev/null || true
          done
          cd release-assets
          sha256sum * > SHA256SUMS.txt
      - name: Sign release binaries with cosign (keyless)
        run: |
          cd release-assets
          for file in clockify-mcp-*; do
            case "$file" in
              *.sig|*.bundle|*.sigstore.json|*.spdx.json|SHA256SUMS.txt) continue ;;
            esac
            echo "Signing $file ..."
            cosign sign-blob --yes \
              --bundle "${file}.sigstore.json" \
              "$file"
          done
          sha256sum * > SHA256SUMS.txt
      - name: Generate build provenance attestation
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v1
        with:
          subject-path: |
            release-assets/clockify-mcp-darwin-arm64
            release-assets/clockify-mcp-darwin-x64
            release-assets/clockify-mcp-linux-x64
            release-assets/clockify-mcp-linux-arm64
            release-assets/clockify-mcp-windows-x64.exe
      - name: Create Release
        uses: softprops/action-gh-release@aec2ec56f94eb8180ceec724245f64ef008b89f5 # v2.4.0
        with:
          generate_release_notes: true
          files: release-assets/*
