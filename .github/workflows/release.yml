name: Release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      contents: write
      id-token: write
      attestations: write
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Install cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # v3
      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@9c156ee8a17a598857849441385a2041ef570552 # v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Stage release binaries for attestation
        run: |
          set -euo pipefail
          mkdir -p staging
          cp dist/clockify-mcp_darwin_arm64_v8.0/clockify-mcp staging/clockify-mcp-darwin-arm64
          cp dist/clockify-mcp_darwin_amd64_v1/clockify-mcp    staging/clockify-mcp-darwin-x64
          cp dist/clockify-mcp_linux_amd64_v1/clockify-mcp     staging/clockify-mcp-linux-x64
          cp dist/clockify-mcp_linux_arm64_v8.0/clockify-mcp   staging/clockify-mcp-linux-arm64
          cp dist/clockify-mcp_windows_amd64_v1/clockify-mcp.exe staging/clockify-mcp-windows-x64.exe
      - name: Generate SLSA build provenance attestation
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v1
        with:
          subject-path: |
            staging/clockify-mcp-darwin-arm64
            staging/clockify-mcp-darwin-x64
            staging/clockify-mcp-linux-x64
            staging/clockify-mcp-linux-arm64
            staging/clockify-mcp-windows-x64.exe
      - name: Publish npm packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          RELEASE_VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret is not set — skipping npm publish."
            echo "To enable npm distribution: set NPM_TOKEN in repo secrets"
            echo "with an automation token scoped to @apet97 (see W2-13 notes)."
            exit 0
          fi
          ./scripts/publish-npm.sh "$RELEASE_VERSION"
