name: Docker Image

# Builds, scans, signs, and publishes the clockify-mcp container image.
#
# Triggers:
#   - tag push v*.*.* → build + push + scan + sign + SBOM + provenance
#   - main branch push → build + scan only (smoke test; no push)
#   - pull request → build + scan only (security gate)
#
# Output:
#   ghcr.io/apet97/go-clockify:<sha>          # every push to main
#   ghcr.io/apet97/go-clockify:v<version>     # on tag
#   ghcr.io/apet97/go-clockify:latest         # on tag (explicit, intentional)
#
# All images are multi-arch (linux/amd64, linux/arm64), signed with cosign
# keyless OIDC, attested with SLSA build provenance, and scanned with Trivy.
# Scan failures on HIGH or CRITICAL vulnerabilities block the workflow.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write
  id-token: write        # cosign keyless signing + attest-build-provenance
  attestations: write    # attest-build-provenance

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/go-clockify

jobs:
  build-scan-sign:
    name: Build, scan, sign
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@c47758b77c9736f4b2ef4073d4d51994fabfe349 # v3.7.1

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@369eb591f429131d6889c46b94e711f089e6ca96 # v5.6.1
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=clockify-mcp
            org.opencontainers.image.description=Go MCP server for Clockify
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push image
        id: build
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355 # v6.10.0
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}

      - name: Trivy vulnerability scan (registry digest)
        if: github.event_name != 'pull_request'
        uses: aquasecurity/trivy-action@6c175e9c4083a92bbca2f9724c8a5e33bc2d97a5 # v0.30.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy vulnerability scan (PR mode)
        if: github.event_name == 'pull_request'
        uses: aquasecurity/trivy-action@6c175e9c4083a92bbca2f9724c8a5e33bc2d97a5 # v0.30.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: github.event_name != 'pull_request'
        uses: github/codeql-action/upload-sarif@4a6bc1df29a3e87a5a8dc96c49b9e1ed6e4ff02d # v3.31.1
        with:
          sarif_file: trivy-results.sarif

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@d7d6bc7722e3daa8354c50bcb52f4837da5e9b6a # v3.8.1
        with:
          cosign-release: v2.4.1

      - name: Sign image (keyless OIDC)
        if: github.event_name != 'pull_request'
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        run: cosign sign --yes "$IMAGE_REF"

      - name: Generate image SBOM (SPDX)
        if: github.event_name != 'pull_request'
        uses: anchore/sbom-action@f325610c9f50a54015d37c8d16cb3b0e2c8f4de0 # v0.18.0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: clockify-mcp-image-sbom.spdx.json
          upload-artifact: true

      - name: Attach SBOM attestation
        if: github.event_name != 'pull_request'
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes \
            --predicate clockify-mcp-image-sbom.spdx.json \
            --type spdxjson \
            "$IMAGE_REF"

      - name: Attest SLSA build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@6842fed91be7a4d68dd8f53c6e3796b5986aeacc # v2.5.1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Summarize
        if: always()
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          {
            echo "## Docker Image"
            echo ""
            echo "**Digest:** \`${DIGEST}\`"
            echo ""
            echo "**Tags:**"
            echo "\`\`\`"
            echo "${TAGS}"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
