name: Load harness

# W2-09 — opt-in load harness. Triggered manually only; never on PR
# critical path. See tests/load/README.md for the scenario catalog and
# acceptance criteria. The workflow_dispatch scenario input is passed
# via env: (SCENARIO) and quoted in run: so untrusted strings cannot
# shell-inject.

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Scenario name (steady, burst, tenant-mix, per-token-saturation)"
        required: true
        default: per-token-saturation

permissions:
  contents: read

jobs:
  load:
    name: Run scenario
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Run scenario
        env:
          SCENARIO: ${{ github.event.inputs.scenario }}
        run: |
          set -euo pipefail
          go run ./tests/load -scenario "$SCENARIO"
