name: Load harness

# W2-09 -- load harness. Triggered manually and on a weekly cron so
# docs/performance.md numbers don't silently drift when the dispatch
# path evolves. PR gate is untouched: the cron runs against main at
# ubuntu-latest hardware and uploads artefacts for triage. The
# scenario input from workflow_dispatch is passed via env: and
# quoted in run: so untrusted strings cannot shell-inject. On
# scheduled runs, github.event.inputs.scenario is empty; the env
# fallback selects the same scenario docs/performance.md measures.
#
# See tests/load/README.md for the scenario catalog.

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Scenario name (steady, burst, tenant-mix, per-token-saturation)"
        required: true
        default: per-token-saturation
  schedule:
    # Sunday 05:00 UTC -- off-hours for US/EU, separated from
    # chaos.yml by 30 min so runner contention and log timestamps
    # are obvious during incident triage.
    - cron: "0 5 * * 0"

permissions:
  contents: read

jobs:
  load:
    name: Run scenario
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.9"
      - name: Run scenario
        env:
          SCENARIO_INPUT: ${{ github.event.inputs.scenario }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/load-output
          # SCENARIO_INPUT is empty on scheduled runs; pick a stable
          # default so the cron always measures the same row in
          # docs/performance.md.
          SCENARIO="${SCENARIO_INPUT:-per-token-saturation}"
          echo "scenario=$SCENARIO"
          go run ./tests/load -scenario "$SCENARIO" | tee /tmp/load-output/run.log
      - name: Upload load harness output
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: load-${{ github.run_id }}
          path: /tmp/load-output/
          retention-days: 90
